{% extends "base.html" %}

{% block title %}Parceiros — entrar{% endblock %}

{% block body %}

<h1 style="margin-top:0">Área do parceiro</h1>

<p class="meta">Entre com o e-mail e a senha do seu cadastro de fornecedor / fabricante.</p>

<form method="post" class="form-grid" style="max-width:360px;margin-top:1rem">

  <div>

    <label for="email">E-mail</label>

    <input id="email" name="email" type="email" required autocomplete="email" maxlength="120">

  </div>

  <div>

    <label for="password">Senha</label>

    <input id="password" name="password" type="password" required autocomplete="current-password">

  </div>

  <button type="submit" class="btn btn--primary">Entrar</button>

</form>

<p class="meta" style="margin-top:1rem">Ainda não tem conta? <a href="{{ url_for('parceiro_cadastro') }}">Cadastre-se como parceiro</a>.</p>

{% endblock %}
